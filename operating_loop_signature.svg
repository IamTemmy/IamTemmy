<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Operating Loop: Sense, Decide, Act, Verify">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0d1822"/>
      <stop offset="72%" stop-color="#070b10"/>
      <stop offset="100%" stop-color="#05070b"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wideGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="trackGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".26"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity=".26"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#34d399"/>
      <stop offset="70%" stop-color="#f5b544"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <path id="forwardPath" d="M250 152 H950"/>
    <path id="returnPath" d="M950 152 C830 225 370 225 250 152"/>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; }
      .title { fill:#6f8798; font-size:13px; letter-spacing:9px; }
      .label { fill:#b8c9d6; font-size:16px; letter-spacing:7px; }
      .small { fill:#4f6574; font-size:11px; letter-spacing:6px; }
      .caption { fill:#536879; font-size:12px; letter-spacing:7px; }
      .track { stroke:url(#trackGrad); stroke-width:2; fill:none; }
      .return { stroke:#263847; stroke-width:1.7; stroke-dasharray:4 12; fill:none; opacity:.65; }
      .nodeInner { fill:#08151e; stroke:#22d3ee; stroke-width:2; }
      .nodeDim { fill:#08151e; stroke:#22d3ee; stroke-opacity:.75; stroke-width:2; }
      @keyframes nodePulse { 0%,13%,100% { opacity:.10; r:16; } 5% { opacity:.95; r:31; } }
      @keyframes decideRing { 0%,18%,100% { opacity:0; r:14; stroke-width:1; } 23% { opacity:.9; r:26; stroke-width:2; } 33% { opacity:0; r:38; stroke-width:1; } }
      @keyframes actBurst { 0%,45%,100% { opacity:0; transform:scale(1); } 52% { opacity:.95; transform:scale(1); } 62% { opacity:0; transform:scale(1.55); } }
      @keyframes verifySettle { 0%,66%,100% { opacity:0; r:14; } 72% { opacity:.85; r:28; } 86% { opacity:0; r:42; } }
      @keyframes returnLight { 0%,72% { stroke-dashoffset:520; opacity:0; } 78% { opacity:.75; } 100% { stroke-dashoffset:0; opacity:0; } }
      @keyframes microFlicker { 0%,100% { opacity:.08; } 50% { opacity:.55; } }
      #senseGlow { animation: nodePulse 5.8s infinite ease-out; }
      #decideRing1 { animation: decideRing 5.8s infinite ease-out; }
      #actBurst { transform-origin:750px 152px; animation: actBurst 5.8s infinite ease-out; }
      #verifyGlow { animation: verifySettle 5.8s infinite ease-out; }
      #returnLight { animation: returnLight 5.8s infinite ease-out; }
      .noise1 { animation: microFlicker 1.1s infinite ease-in-out; }
      .noise2 { animation: microFlicker 1.7s infinite ease-in-out; }
      .noise3 { animation: microFlicker .8s infinite ease-in-out; }
    </style>
  </defs>
  <rect width="1200" height="320" rx="18" fill="url(#bgGlow)"/>
  <rect x="1" y="1" width="1198" height="318" rx="18" fill="none" stroke="#11202b"/>

  <g opacity=".65">
    <path class="noise1" d="M150 170 C160 142 170 182 180 154 C190 130 200 178 210 150 C220 142 226 166 232 152" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity=".35"/>
    <path class="noise2" d="M155 142 C165 168 174 130 184 156 C194 190 203 136 214 160 C222 172 232 143 240 152" fill="none" stroke="#7dd3fc" stroke-width="1" stroke-opacity=".22"/>
    <g class="noise3" fill="#22d3ee">
      <circle cx="165" cy="137" r="1.5"/><circle cx="176" cy="178" r="1.2"/><circle cx="198" cy="134" r="1.3"/><circle cx="215" cy="184" r="1.4"/><circle cx="232" cy="138" r="1.1"/>
    </g>
  </g>

  <g class="mono">
    <text x="250" y="122" text-anchor="middle" class="label">SENSE</text>
    <text x="483" y="122" text-anchor="middle" class="label">DECIDE</text>
    <text x="750" y="122" text-anchor="middle" class="label">ACT</text>
    <text x="950" y="122" text-anchor="middle" class="label">VERIFY</text>
  </g>

  <path d="M250 152 H950" class="track"/>
  <path d="M950 152 C830 225 370 225 250 152" class="return"/>
  <path id="returnLight" d="M950 152 C830 225 370 225 250 152" stroke="#a78bfa" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="520" stroke-dashoffset="520" fill="none" filter="url(#softGlow)"/>

  <g stroke="#2d4252" stroke-width="1.4" fill="none" opacity=".95">
    <path d="M345 152 l9 -6 m-9 6 l9 6"/>
    <path d="M612 152 l9 -6 m-9 6 l9 6"/>
    <path d="M850 152 l9 -6 m-9 6 l9 6"/>
  </g>

  <circle id="senseGlow" cx="250" cy="152" r="16" fill="#22d3ee" opacity=".12" filter="url(#wideGlow)"/>
  <circle id="verifyGlow" cx="950" cy="152" r="16" fill="#c084fc" opacity="0" filter="url(#wideGlow)"/>
  <circle cx="250" cy="152" r="8" class="nodeInner" filter="url(#softGlow)"/>
  <circle cx="483" cy="152" r="7" class="nodeDim"/>
  <circle cx="750" cy="152" r="7" class="nodeDim"/>
  <circle cx="950" cy="152" r="7" class="nodeDim"/>
  <circle id="decideRing1" cx="483" cy="152" r="14" fill="none" stroke="#34d399" opacity="0" filter="url(#softGlow)"/>
  <g id="actBurst" opacity="0" stroke="#f5b544" stroke-width="2" stroke-linecap="round">
    <circle cx="750" cy="152" r="18" fill="none" filter="url(#softGlow)"/>
    <path d="M728 152 H708 M772 152 H792 M750 130 V111 M750 174 V193"/>
  </g>

  <g filter="url(#softGlow)">
    <circle r="6" fill="url(#pulseGrad)">
      <animateMotion dur="5.8s" repeatCount="indefinite" keyTimes="0;0.74;1" keyPoints="0;1;1" calcMode="linear">
        <mpath href="#forwardPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.72;0.75" dur="5.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="13" fill="none" stroke="#22d3ee" stroke-width="1.5">
      <animateMotion dur="5.8s" repeatCount="indefinite" keyTimes="0;0.74;1" keyPoints="0;1;1" calcMode="linear">
        <mpath href="#forwardPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.25;.25;0" keyTimes="0;0.06;0.72;0.75" dur="5.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="600" y="248" text-anchor="middle" class="mono caption">VERIFY → IMPROVE</text>
  <text x="600" y="278" text-anchor="middle" class="mono small">REALITY BECOMES MEASUREMENT · MEASUREMENT BECOMES ACTION · ACTION BECOMES LEARNING</text>
</svg>